<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Лицензия MIT | Феникс 🐦‍🔥</title>
  <link rel="stylesheet" href="/css/core.css">
  <style>
    body { padding: 2rem; }
    .container { max-width: 800px; margin: 0 auto; }
    pre { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,100,0,0.3); border-radius: 12px; padding: 1.5rem; overflow-x: auto; white-space: pre-wrap; font-size: 0.9rem; }
    .back-link { display: inline-block; margin-bottom: 2rem; color: #ffaa66; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Вернуться в Сад</a>
    <h1>📜 Лицензия MIT</h1>
    <pre id="license-text">Загрузка...</pre>
  </div>
  <script>
    fetch('/LICENSE')
      .then(r => r.text())
      .then(t => document.getElementById('license-text').textContent = t)
      .catch(() => document.getElementById('license-text').textContent = 'Лицензия MIT');
  </script>
</body>
</html>
