<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Профиль | Феникс 🐦‍🔥</title>
  <link rel="stylesheet" href="/css/core.css">
  <style>
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Inter', sans-serif; padding: 2rem; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 600px; width: 100%; text-align: center; }
    .back-link { display: inline-block; margin-bottom: 2rem; color: #ffaa66; text-decoration: none; font-size: 0.9rem; }
    .avatar-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto 1rem; }
    .avatar { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #ff5500; object-fit: cover; background: #2a2a3e; box-shadow: 0 0 30px rgba(255, 80, 0, 0.4); }
    .name { font-size: 1.8rem; color: #ffd9b3; margin: 0.5rem 0; }
    .btn { background: #ff5500; border: none; color: #fff; padding: 0.6rem 2rem; border-radius: 30px; cursor: pointer; font-size: 0.9rem; margin: 0.5rem; }
    .edit-form { display: none; background: rgba(20,20,30,0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,100,0,0.4); border-radius: 20px; padding: 1.5rem; margin-top: 1.5rem; }
    .edit-form input[type="text"] { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,140,0,0.3); border-radius: 12px; padding: 0.7rem; color: #fff; margin-bottom: 0.8rem; }
    .edit-form input[type="file"] { color: #aa8c7a; margin-bottom: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Вернуться в Сад</a>
    <div id="profileContent"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const did = urlParams.get('did') || (JSON.parse(localStorage.getItem('phoenix_did') || '{}')).did || '';

    async function loadProfile() {
      if (!did) return document.getElementById('profileContent').innerHTML = '<p>DID не найден.</p>';
      try {
        const res = await fetch(`/api/profile/${encodeURIComponent(did)}`);
        const data = await res.json();
        if (!data.success) return document.getElementById('profileContent').innerHTML = '<p>Профиль не найден.</p>';

        const p = data.data;
        const isOwner = (JSON.parse(localStorage.getItem('phoenix_did') || '{}')).did === did;
        const avatarUrl = p.avatar || '/icons/phoenix-192.png';
        const displayName = p.display_name || 'Архитектор ' + did.substring(0, 8) + '...';

        document.getElementById('profileContent').innerHTML = `
          <div class="avatar-wrapper">
            <img src="${avatarUrl}" class="avatar" id="avatarImg">
          </div>
          <div class="name" id="nameDisplay">${displayName}</div>
          <div class="did-display" style="font-size:0.8rem;color:#aa8c7a;word-break:break-all;">${did}</div>
          ${isOwner ? `
            <button class="btn" onclick="toggleEdit()">✏️ Редактировать</button>
            <div class="edit-form" id="editForm">
              <input type="text" id="newName" placeholder="Твоё имя" value="${p.display_name || ''}">
              <input type="file" id="newAvatar" accept="image/*">
              <button class="btn" onclick="saveProfile()">Сохранить</button>
            </div>` : ''}
        `;
      } catch(e) {
        document.getElementById('profileContent').innerHTML = '<p>Ошибка загрузки профиля.</p>';
      }
    }

    window.toggleEdit = function() {
      const form = document.getElementById('editForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    };

    window.saveProfile = async function() {
      const name = document.getElementById('newName').value;
      const file = document.getElementById('newAvatar').files[0];
      const formData = new FormData();
      formData.append('did', did);
      formData.append('display_name', name);
      if (file) formData.append('avatar', file);

      try {
        const res = await fetch('/api/profile/update', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) {
          location.reload();
        } else {
          alert('Ошибка обновления');
        }
      } catch(e) { alert('Ошибка сети'); }
    };

    loadProfile();
  </script>
</body>
</html>
